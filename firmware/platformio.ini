; ──────────────────────────────────────────────
; PM-Chat Mesh Firmware — PlatformIO Configuration
; Target: RAK3172-E Evaluation Board (STM32WLE5CC)
; ──────────────────────────────────────────────

[env:rak3172]
platform = ststm32
board = genericSTM32WLE5CC
framework = arduino

monitor_speed = 115200
upload_protocol = stlink
debug_tool = stlink

lib_deps =
    jgromes/RadioLib@^6.6.0
    olikraus/U8g2@^2.35.19
    rweather/Crypto@^0.4.0

build_flags =
    -DHAL_RNG_MODULE_ENABLED
    -DFIRMWARE_VERSION=\"1.0.0\"
    -Os
    -Wall
    -Wextra
    -Wno-unused-parameter

; ── Test environment ──
[env:test]
platform = ststm32
board = genericSTM32WLE5CC
framework = arduino
test_framework = unity
lib_deps = ${env:rak3172.lib_deps}
build_flags = ${env:rak3172.build_flags}
