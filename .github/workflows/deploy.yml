name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  WEB_HEALTHCHECK_PATH: /api/health

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
      - run: npm run test

  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/web
      - name: Deploy to Vercel
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} \
            | tee /tmp/vercel-deploy-output.txt
        working-directory: apps/web
      - name: Verify deployed health endpoint
        run: |
          DEPLOY_URL=$(grep -Eo 'https://[a-zA-Z0-9][a-zA-Z0-9._-]*\.vercel\.app' /tmp/vercel-deploy-output.txt | tail -n1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "Unable to detect deployed URL from Vercel output"
            exit 1
          fi
          BASE_URL="${DEPLOY_URL%/}"
          HEALTH_PATH="${WEB_HEALTHCHECK_PATH:-/api/health}"
          case "$HEALTH_PATH" in
            /*) ;;
            *) HEALTH_PATH="/$HEALTH_PATH" ;;
          esac
          HEALTH_URL="${BASE_URL}${HEALTH_PATH}"
          echo "Checking deployment health on $HEALTH_URL"
          for i in {1..6}; do
            if curl -fsS --max-time 10 "$HEALTH_URL" >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "Deployment health check failed after retries"
          exit 1
