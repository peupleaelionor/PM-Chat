version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: pm-chat-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: pmchat
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: pm-chat-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: pm-chat-server
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGODB_URI: mongodb://mongodb:27017/pmchat
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: pm-chat-web
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://server:4000
      NEXT_PUBLIC_SOCKET_URL: http://server:4000
    ports:
      - "3000:3000"

volumes:
  mongo_data:
  redis_data:
